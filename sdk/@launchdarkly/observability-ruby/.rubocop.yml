AllCops:
    TargetRubyVersion: 3.0
    NewCops: enable
    SuggestExtensions: false

Layout/LineLength:
    Enabled: false

Layout/HashAlignment:
    Enabled: false

Layout/EmptyLineAfterGuardClause:
    Enabled: false

Style/Documentation:
    Enabled: false

Style/IfUnlessModifier:
    Enabled: false

Lint/DuplicateBranch:
    Enabled: false

Naming/MethodParameterName:
    Enabled: false

Naming/PredicateMethod:
    Enabled: false

Gemspec/DevelopmentDependencies:
    Enabled: false

Metrics/MethodLength:
    Max: 35

Metrics/ClassLength:
    Max: 200
    Exclude:
        - 'test/**/*'

Metrics/AbcSize:
    Max: 31
    Exclude:
        - 'test/**/*'

Metrics/CyclomaticComplexity:
    Max: 15
    Exclude:
        - 'test/**/*'

Metrics/PerceivedComplexity:
    Max: 15
    Exclude:
        - 'test/**/*'

Metrics/BlockLength:
    Exclude:
        - 'test/**/*'
        - '*.gemspec'
