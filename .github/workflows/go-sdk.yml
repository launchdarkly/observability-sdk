name: 'Golang SDK code checks'

on:
    push:
        branches: ['main']
    pull_request:
        types: [opened, synchronize]
        paths:
            - 'sdk/highlight-go/**'
            - '.github/workflows/go-sdk.yml'

concurrency: ${{ github.workflow }}-${{ github.ref }}
jobs:
    format:
        name: format go files
        runs-on: ubuntu-22.04-8core-32gb
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: './sdk/highlight-go/go.mod'
                  cache-dependency-path: './sdk/highlight-go/go.sum'
            - name: Format
              uses: Jerome1337/gofmt-action@d5eabd189843f1d568286a54578159978b7c0fb1 # v1.0.5
              with:
                  gofmt-path: './sdk/highlight-go'
                  gofmt-flags: '-l -d'

    lint:
        name: lint go files
        runs-on: ubuntu-22.04-8core-32gb
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: './sdk/highlight-go/go.mod'
                  cache-dependency-path: './sdk/highlight-go/go.sum'
            - name: Run linter
              uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
              with:
                  args: -v --config ./.golangci.yaml
                  working-directory: sdk/highlight-go
                  version: v2.11.4

    build:
        name: build binary
        runs-on: ubuntu-22.04-8core-32gb
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: './sdk/highlight-go/go.mod'
                  cache-dependency-path: './sdk/highlight-go/go.sum'
            - name: Build binary
              run: cd sdk/highlight-go && go build .

    test-and-cov:
        name: run tests and generate code coverage profile
        needs: [build]
        runs-on: ubuntu-22.04-8core-32gb
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: './sdk/highlight-go/go.mod'
                  cache-dependency-path: './sdk/highlight-go/go.sum'
            - name: Run tests
              run: cd sdk/highlight-go && go test -race -covermode=atomic -coverprofile=coverage.out --v
