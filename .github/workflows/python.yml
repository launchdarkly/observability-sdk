name: Python SDK

on:
    push:
        branches: ['main']
    pull_request:
        types: [opened, synchronize]
        paths:
            - 'e2e/tests/**'
            - 'sdk/highlight-py/**'
            - '.github/workflows/python.yml'

concurrency: ${{ github.workflow }}-${{ github.ref }}
jobs:
    build:
        permissions:
            id-token: write # for python PyPI OIDC login
            contents: write
            pull-requests: write
            repository-projects: write
        name: Python SDK
        runs-on: ubuntu-22.04-8core-32gb
        defaults:
            run:
                working-directory: ./sdk/highlight-py
        steps:
            - uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Install poetry
              run: pipx install poetry
            - uses: actions/setup-python@v4
              with:
                  python-version: '3.12'
                  cache: 'poetry'
            - run: poetry install --all-extras
            - name: Lint
              run: poetry run black --check .
            - name: Test
              run: poetry run pytest --cov=highlight_io --cov-branch --cov-report xml
            - name: Get Cover
              if: github.event_name == 'pull_request'
              uses: orgoro/coverage@d77626a5fa35d39123e86d6c62907fabe2491496 # v3
              with:
                  coverageFile: ./sdk/highlight-py/coverage.xml
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Build
              run: poetry build
            - name: Validate PyProject
              working-directory: ./e2e/python/setuptools
              run: |
                  python -m pip install -U pip pip-tools;
                  python -m piptools compile --upgrade pyproject.toml;
            - name: Publish
              if: github.ref == 'refs/heads/main'
              uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
              with:
                  packages-dir: ./sdk/highlight-py/dist/
                  skip-existing: true

    e2e:
        name: Validate E2E tests
        runs-on: ubuntu-22.04-8core-32gb
        defaults:
            run:
                working-directory: ./e2e/tests

        steps:
            - uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Install poetry
              run: pipx install poetry
            - uses: actions/setup-python@v4
              with:
                  python-version: '3.10'
                  cache: 'poetry'
            - run: poetry install --all-extras
            - name: Lint
              run: poetry run black --check .
