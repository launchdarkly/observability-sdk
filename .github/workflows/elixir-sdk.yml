name: 'Elixir SDK code checks'

on:
    push:
        branches: ['main']
    pull_request:
        types: [opened, synchronize]
        paths:
            - 'sdk/highlight-ex/**'
            - '.github/workflows/elixir-sdk.yml'

env:
    ELIXIR_VERSION: '1.13.4'
    OTP_VERSION: '25.0.1'

concurrency: ${{ github.workflow }}-${{ github.ref }}
jobs:
    format:
        name: format elixir files
        runs-on: ubuntu-22.04-8core-32gb
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Setup Elixir
              uses: erlef/setup-beam@ee09b1e59bb240681c382eb1f0abc6a04af72764 # v1
              with:
                  elixir-version: ${{ env.ELIXIR_VERSION }}
                  otp-version: ${{ env.OTP_VERSION }}
            - name: Format
              working-directory: sdk/highlight-ex
              run: mix format

    test:
        name: test package
        runs-on: ubuntu-22.04-8core-32gb
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Setup Elixir
              uses: erlef/setup-beam@ee09b1e59bb240681c382eb1f0abc6a04af72764 # v1
              with:
                  elixir-version: ${{ env.ELIXIR_VERSION }}
                  otp-version: ${{ env.OTP_VERSION }}
            - name: Install Dependencies
              working-directory: sdk/highlight-ex
              run: mix deps.get
            - name: Run Tests
              working-directory: sdk/highlight-ex
              run: mix test

    publish:
        name: publish package
        runs-on: ubuntu-22.04-8core-32gb
        if: github.ref == 'ref/heads/main'
        needs: test
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Setup Elixir
              uses: erlef/setup-beam@ee09b1e59bb240681c382eb1f0abc6a04af72764 # v1
              with:
                  elixir-version: ${{ env.ELIXIR_VERSION }}
                  otp-version: ${{ env.OTP_VERSION }}
            - name: Publish to Hex
              uses: synchronal/hex-publish-action@2e73c1e570ae96dcfe548b498df7c8c1942a3100 # v3
              with:
                  name: highlight
                  key: ${{ secrets.HEX_PM_KEY }}
                  tag-release: false
                  working-directory: sdk/highlight-ex
