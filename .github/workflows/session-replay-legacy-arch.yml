name: 'Session Replay (Legacy Architecture)'

# Confirms that @launchdarkly/session-replay-react-native builds against the
# React Native LEGACY architecture. It builds the committed `example-legacy`
# app (RN 0.78, newArchEnabled=false / RCT_NEW_ARCH_ENABLED=0) against the
# locally-linked workspace packages.
#
# Build success confirms:
#   - Finding 2 (iOS): the Swift bridging header / .mm compiles under default
#     static-library CocoaPods.
#   - Finding 3 (Android): generateCodegenArtifactsFromSchema runs cleanly with a
#     single codegen version (the consumer crash is a version-mismatch, not us).
#   - Finding 1 (build-level): the legacy module + generated spec compile and
#     autolink. Runtime registration is exercised by launching the app (a
#     follow-up emulator/simulator smoke step).

on:
    push:
        branches: ['main']
        paths:
            - 'sdk/@launchdarkly/react-native-ld-session-replay/**'
            - 'sdk/@launchdarkly/observability-react-native/**'
            - '.github/workflows/session-replay-legacy-arch.yml'
    pull_request:
        types: [opened, synchronize]
        paths:
            - 'sdk/@launchdarkly/react-native-ld-session-replay/**'
            - 'sdk/@launchdarkly/observability-react-native/**'
            - '.github/workflows/session-replay-legacy-arch.yml'
    workflow_dispatch:

permissions:
    contents: read

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
    EXAMPLE_DIR: sdk/@launchdarkly/react-native-ld-session-replay/example-legacy

jobs:
    android-legacy:
        name: Android build (legacy arch, RN 0.78)
        timeout-minutes: 60
        runs-on: ubuntu-22.04-8core-32gb
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - run: git submodule update --init --recursive

            - name: Setup Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version: 24.15.0
                  cache: 'yarn'

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: 'temurin'
                  java-version: 17

            - name: Set up Android SDK
              uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

            - name: Install workspace dependencies
              run: yarn install --immutable

            - name: Build Android (assembleDebug)
              working-directory: ${{ env.EXAMPLE_DIR }}/android
              run: ./gradlew assembleDebug --no-daemon --console=plain

    ios-legacy:
        name: iOS build (legacy arch, RN 0.78)
        timeout-minutes: 90
        runs-on: macos-14
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - run: git submodule update --init --recursive

            - name: Setup Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version: 24.15.0
                  cache: 'yarn'

            - name: Install workspace dependencies
              run: yarn install --immutable

            - name: Install pods (legacy arch)
              working-directory: ${{ env.EXAMPLE_DIR }}/ios
              env:
                  RCT_NEW_ARCH_ENABLED: '0'
              run: bundle install && bundle exec pod install --repo-update

            - name: Build iOS (Debug, simulator)
              working-directory: ${{ env.EXAMPLE_DIR }}/ios
              run: |
                  xcodebuild \
                    -workspace SessionReplayLegacyExample.xcworkspace \
                    -scheme SessionReplayLegacyExample \
                    -configuration Debug \
                    -sdk iphonesimulator \
                    -destination 'generic/platform=iOS Simulator' \
                    CODE_SIGNING_ALLOWED=NO \
                    build | xcbeautify || (xcodebuild \
                    -workspace SessionReplayLegacyExample.xcworkspace \
                    -scheme SessionReplayLegacyExample \
                    -configuration Debug \
                    -sdk iphonesimulator \
                    -destination 'generic/platform=iOS Simulator' \
                    CODE_SIGNING_ALLOWED=NO \
                    build)
