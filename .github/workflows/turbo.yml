# This workflow handles CI (build/test) for all PRs and pushes to main,
# as well as npm publishing for @launchdarkly and @highlight-run packages.
#
# AUTOMATED PUBLISHING (on push to main):
#   - Publishes @highlight-run/* and highlight.run packages using NPM token
#   - Publishes @launchdarkly/* packages using OIDC authentication
#
# MANUAL PUBLISHING (via workflow_dispatch):
#   - Can be triggered manually from the Actions tab
#   - Supports prerelease and dry-run modes for @launchdarkly/* packages
#   - OIDC requires a single workflow per npm package, so manual publishing
#     is consolidated here rather than in a separate workflow
name: Monorepo

on:
    push:
        branches: ['main']
    pull_request:
        types: [opened, synchronize]
    workflow_dispatch:
        inputs:
            dry-run:
                description: 'Is this a dry run. If so no package will be published.'
                type: boolean
                required: true
            prerelease:
                description: 'Is this a prerelease. If so, then the latest tag will not be updated in npm.'
                type: boolean
                required: true

permissions:
    id-token: write
    contents: write
    packages: write
    pull-requests: write
    issues: read

concurrency: ${{ github.workflow }}-${{ github.ref }}
jobs:
    yarn-monorepo:
        name: Build Yarn Turborepo
        timeout-minutes: 60
        runs-on: ubuntu-22.04-8core-32gb
        # configures turborepo Remote Caching
        env:
            TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
            TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - run: git submodule update --init --recursive

            # automatically caches dependencies based on yarn.lock
            - name: Setup Node.js environment
              uses: actions/setup-node@v4
              with:
                  # Pinned: lts/* floated to Node 24.16.0, which hangs the rrvideo
                  # Playwright browser download during `yarn install` until the job
                  # times out. 24.15.0 is the last known-good. See PR #575.
                  node-version: 24.15.0
                  cache: 'yarn'

            - name: Install js dependencies
              run: yarn install

            - name: Detect JS monorepo changes
              uses: dorny/paths-filter@4512585405083f25c027a35db413c2b3b9006d50 # v2
              id: changes
              with:
                  filters: |
                      yarn-test:
                        - '**'
                        - '!sdk/@launchdarkly/observability-android/**'
                        - '!sdk/@launchdarkly/mobile-dotnet/**'
                        - '!sdk/@launchdarkly/flutter/**'
                        - '!e2e/android/**'
                        - '!.github/workflows/android-observability.yml'
                        - '!.github/workflows/android-e2e.yml'
                        - '!.github/workflows/flutter-observability.yml'
                        - '!.github/workflows/flutter-observability-publish.yml'

            - name: Check yarn for duplicate deps
              run: yarn dedupe --check

            - name: Check formatting
              run: yarn format-check

            - name: Build & test (in a fork without doppler)
              if: steps.changes.outputs.yarn-test == 'true' || github.event_name == 'workflow_dispatch'
              run: yarn test
              env:
                  NEXT_PUBLIC_HIGHLIGHT_PROJECT_ID: 1jdkoe52
                  REACT_APP_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

            - name: Skipped yarn test (native-only change)
              if: steps.changes.outputs.yarn-test != 'true' && github.event_name != 'workflow_dispatch'
              run: echo "Skipping yarn test — only Android, MAUI (.NET), and/or Flutter paths changed."

            # Guard against shipping unresolvable types: install the freshly
            # built package into a clean consumer and type-check it with
            # skipLibCheck:false. Runs before publish so a broken .d.ts blocks
            # the release. See scripts/check-published-types.mjs.
            #
            # Skipped on native-only changes for the same reason as `yarn test`:
            # the script requires sdk/highlight-run/dist/index.d.ts, which is
            # produced by the turbo build that only runs as part of `yarn test`.
            - name: Verify published types resolve in a clean consumer
              if: steps.changes.outputs.yarn-test == 'true' || github.event_name == 'workflow_dispatch'
              run: node scripts/check-published-types.mjs

            - name: Configure yarn npm registry credentials
              if: github.ref == 'refs/heads/main'
              run: |
                  yarn config set npmRegistryServer "https://registry.npmjs.org"
                  yarn config set npmAuthToken "${NPM_TOKEN}"
              env:
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN_HIGHLIGHT_RUN }}

            - name: Publish highlight npm packages
              if: github.ref == 'refs/heads/main'
              run: yarn publish:highlight

            # Publishing credentials for @launchdarkly/* NPM packages come from OIDC.
            - name: Setup Node.js for OIDC publishing
              if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
              uses: ./.github/actions/setup-release-node

            - name: Publish @launchdarkly npm packages
              if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
              shell: bash
              run: ./scripts/publish-npm.sh
              env:
                  LD_RELEASE_IS_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
                  LD_RELEASE_IS_DRYRUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || false }}
